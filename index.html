<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestao de EPIs - Sementes Tormenta</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(160deg,#0a2e0a,#0d3d10 30%,#0b4a12 55%,#093508 80%,#071f07);min-height:100vh;color:#e8eaf0}
input,select,textarea,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
select option{background:#1a2e1a}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:rgba(80,160,60,.3);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.toast{animation:fadeIn .3s ease}
.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center}
.modal-box{background:#0d1f0d;border-radius:20px;padding:32px 28px;width:90%;max-width:400px;box-shadow:0 8px 48px #000c}
.card{background:rgba(10,20,12,.72);border:1px solid rgba(80,160,60,.18);border-radius:18px;padding:18px;backdrop-filter:blur(12px)}
.btn{border:none;cursor:pointer;font-weight:700;font-size:14px;border-radius:10px;padding:10px 18px;color:#fff;transition:opacity .2s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.inp{width:100%;background:rgba(15,20,15,.6);border:1px solid rgba(80,160,60,.25);border-radius:10px;color:#e8eaf0;font-size:14px;padding:10px 14px;outline:none}
.lbl{font-size:13px;color:#a8c8a0;display:block;margin-bottom:6px}
.sidebar{display:flex;flex-direction:column;gap:4px;background:rgba(10,20,12,.72);border-radius:14px;padding:6px;min-width:178px;flex-shrink:0}
.tab-btn{padding:11px 14px;border-radius:10px;border:none;background:transparent;color:#a8c8a0;font-weight:500;cursor:pointer;font-size:13px;text-align:left;display:flex;align-items:center;gap:6px;width:100%}
.tab-btn.active{background:linear-gradient(90deg,#e74c3c,#8e44ad);color:#fff;font-weight:700}
.badge{margin-left:auto;background:#e74c3c;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.tag{font-size:11px;border-radius:6px;padding:3px 9px;font-weight:600}
.bar-track{background:rgba(20,35,20,.7);border-radius:99px;height:7px;overflow:hidden;margin-bottom:4px}
.bar-fill{height:100%;border-radius:99px;transition:width .5s}
.num-row{display:flex;gap:10px;align-items:center}
.num-btn{width:36px;height:36px;border-radius:8px;background:rgba(20,35,20,.7);border:none;color:#e8eaf0;font-size:20px;cursor:pointer}
.num-field{width:64px;text-align:center;background:rgba(20,35,20,.7);border:1px solid rgba(80,160,60,.2);border-radius:8px;color:#e8eaf0;font-size:16px;padding:6px 0;font-weight:700}
.avatar{border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:rgba(20,35,20,.9);color:#a8c8a0;padding:8px 10px;text-align:left;font-weight:700;font-size:11px;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid rgba(80,160,60,.08);vertical-align:middle;color:#e8eaf0}
tr:nth-child(even) td{background:rgba(15,25,15,.3)}
</style>
</head>
<body>
<div id="root"></div>
<script>
var h = React.createElement;
var useState = React.useState;

var EMJ=["🪖","🧤","🥽","🎧","🦺","👢","😷","🔗","🧣","🧥","🩺","⛑️","🔦","🧲","🪝","🛡️","🔧","⚙️"];
var CATS=["Cabeça","Mãos","Olhos","Audição","Corpo","Pés","Respiração","Queda","Outros"];
var UNITS=["un","par","cx","kg","m","rolo"];
var CORES=["#e74c3c","#3498db","#1abc9c","#f39c12","#8e44ad","#e67e22"];

var EPIS0=[
  {id:1,nome:"Capacete de Segurança",cat:"Cabeça",est:15,min:10,un:"un",img:"🪖",ca:"31469",val:"2026-12-31",cod:"EPI-001"},
  {id:2,nome:"Luva de Borracha",cat:"Mãos",est:8,min:20,un:"par",img:"🧤",ca:"10918",val:"2025-06-30",cod:"EPI-002"},
  {id:3,nome:"Óculos de Proteção",cat:"Olhos",est:4,min:15,un:"un",img:"🥽",ca:"19793",val:"2026-09-15",cod:"EPI-003"},
  {id:4,nome:"Protetor Auricular",cat:"Audição",est:30,min:25,un:"un",img:"🎧",ca:"5674",val:"2027-03-01",cod:"EPI-004"},
  {id:5,nome:"Colete Refletivo",cat:"Corpo",est:2,min:8,un:"un",img:"🦺",ca:"41139",val:"2026-05-20",cod:"EPI-005"},
  {id:6,nome:"Bota de Segurança",cat:"Pés",est:6,min:10,un:"par",img:"👢",ca:"28001",val:"2026-08-10",cod:"EPI-006"},
  {id:7,nome:"Máscara PFF2",cat:"Respiração",est:45,min:30,un:"un",img:"😷",ca:"39503",val:"2025-12-01",cod:"EPI-007"},
  {id:8,nome:"Cinto de Segurança",cat:"Queda",est:3,min:5,un:"un",img:"🔗",ca:"12345",val:"2027-01-15",cod:"EPI-008"},
];
var USERS0=[
  {id:1,nome:"Carlos Silva",wpp:"(47) 99100-0001",cargo:"Técnico de Segurança",perfil:"admin",status:"ativo",av:"CS",cor:"#8e44ad"},
  {id:2,nome:"Ana Oliveira",wpp:"(47) 99100-0002",cargo:"Almoxarife",perfil:"editor",status:"ativo",av:"AO",cor:"#3498db"},
];

function fmtDate(v){if(!v)return"—";var p=v.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function svStatus(v){
  if(!v)return null;
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var d=new Date(v+"T00:00:00");
  var dias=Math.round((d-hoje)/86400000);
  if(dias<0)return{label:"VENCIDO",cor:"#e74c3c"};
  if(dias<=30)return{label:"Vence em "+dias+"d",cor:"#e74c3c"};
  if(dias<=90)return{label:"Vence em "+dias+"d",cor:"#f39c12"};
  return{label:"Valido ("+dias+"d)",cor:"#1abc9c"};
}
function pct(e){return Math.min(100,Math.round((e.est/e.min)*100));}
function corBar(e){return e.est<e.min?"#e74c3c":pct(e)<60?"#f39c12":"#1abc9c";}

function Btn(props){
  return h("button",{className:"btn",onClick:props.onClick,disabled:props.disabled,style:props.style||{}},props.children);
}
function NumInp(props){
  var val=props.val,set=props.set,min=props.min||1,max=props.max;
  return h("div",{className:"num-row"},
    h("button",{className:"num-btn",onClick:function(){set(Math.max(min,val-1))}},"−"),
    h("input",{type:"number",className:"num-field",value:val,min:min,max:max,
      onChange:function(e){set(Math.max(min,max!=null?Math.min(max,+e.target.value):+e.target.value));}}),
    h("button",{className:"num-btn",onClick:function(){set(max!=null?Math.min(max,val+1):val+1);}},"＋")
  );
}
function Modal(props){
  return h("div",{className:"modal-bg",onClick:props.onClose},
    h("div",{className:"modal-box",style:{border:"1px solid "+(props.borderColor||"rgba(80,160,60,.2)")},
      onClick:function(e){e.stopPropagation();}},props.children)
  );
}

function App(){
  var s=useState; // alias
  var epis=s(EPIS0),setEpis=epis[1];epis=epis[0];
  var users=s(USERS0),setUsers=users[1];users=users[0];
  var aba=s("estoque"),setAba=aba[1];aba=aba[0];
  var toast=s(null),setToast=toast[1];toast=toast[0];
  var mRet=s(null),setMRet=mRet[1];mRet=mRet[0];
  var mEnt=s(null),setMEnt=mEnt[1];mEnt=mEnt[0];
  var qRet=s(1),setQRet=qRet[1];qRet=qRet[0];
  var qEnt=s(1),setQEnt=qEnt[1];qEnt=qEnt[0];
  var EPI0={nome:"",cat:"Cabeça",est:0,min:5,un:"un",img:"🪖",ca:"",val:"",cod:""};
  var USR0={nome:"",wpp:"",cargo:"",perfil:"visualizador"};
  var novoEpi=s(EPI0),setNovoEpi=novoEpi[1];novoEpi=novoEpi[0];
  var errEpi=s({}),setErrEpi=errEpi[1];errEpi=errEpi[0];
  var novoUsr=s(USR0),setNovoUsr=novoUsr[1];novoUsr=novoUsr[0];
  var errUsr=s({}),setErrUsr=errUsr[1];errUsr=errUsr[0];
  var msgC=s(""),setMsgC=msgC[1];msgC=msgC[0];
  var enviado=s(false),setEnviado=enviado[1];enviado=enviado[0];
  var importPreview=s([]),setImportPreview=importPreview[1];importPreview=importPreview[0];
  var importErro=s(""),setImportErro=importErro[1];importErro=importErro[0];
  var importOk=s(false),setImportOk=importOk[1];importOk=importOk[0];

  var criticos=epis.filter(function(e){return e.est<e.min;});

  function toast_(msg){setToast(msg);setTimeout(function(){setToast(null);},3000);}

  function retirar(id,q){
    setEpis(function(p){return p.map(function(e){return e.id===id?Object.assign({},e,{est:Math.max(0,e.est-q)}):e;});});
    toast_(q+"x retirado(s) ✅");setMRet(null);setQRet(1);
  }
  function entrar(id,q){
    setEpis(function(p){return p.map(function(e){return e.id===id?Object.assign({},e,{est:e.est+q}):e;});});
    toast_("+"+q+" adicionado(s) ✅");setMEnt(null);setQEnt(1);
  }
  function salvarEpi(){
    var e={};
    if(!novoEpi.nome.trim())e.nome="Nome obrigatório";
    if(novoEpi.min<=0)e.min="Deve ser > 0";
    setErrEpi(e);if(Object.keys(e).length)return;
    setEpis(function(p){return p.concat([Object.assign({},novoEpi,{id:Date.now()})]);});
    toast_(novoEpi.nome+" cadastrado! 🎉");
    setNovoEpi(EPI0);setErrEpi({});setAba("estoque");
  }
  function excluirEpi(id){
    if(!confirm("Excluir este EPI?"))return;
    setEpis(function(p){return p.filter(function(e){return e.id!==id;});});toast_("EPI removido");
  }
  function gerarMsg(){
    var linhas=criticos.map(function(e){
      return "- "+e.img+" "+e.nome+": "+e.est+" "+e.un+" (min: "+e.min+")"+(e.ca?" | CA: "+e.ca:"")+(e.val?" | Validade: "+fmtDate(e.val):"");
    }).join("\n");
    setMsgC("Solicitacao de Compra de EPIs - URGENTE\n\nPrezados,\n\nOs seguintes EPIs estao abaixo do estoque minimo:\n\n"+linhas+"\n\nSolicitamos reposicao urgente.\n\nAtenciosamente,\nSetor de Seguranca do Trabalho");
  }
  function envWpp(){
    if(navigator.clipboard)navigator.clipboard.writeText(msgC).catch(function(){});
    window.open("https://web.whatsapp.com/send?text="+encodeURIComponent(msgC),"_blank");
    setEnviado(true);toast_("WhatsApp aberto!");setTimeout(function(){setEnviado(false);},3000);
  }
  function convidar(){
    var e={};
    if(!novoUsr.nome.trim())e.nome="Nome obrigatório";
    if(!novoUsr.wpp.trim())e.wpp="Informe o WhatsApp";
    setErrUsr(e);if(Object.keys(e).length)return;
    var av=novoUsr.nome.split(" ").map(function(p){return p[0];}).join("").slice(0,2).toUpperCase();
    var cor=CORES[Math.floor(Math.random()*CORES.length)];
    var novo=Object.assign({},novoUsr,{id:Date.now(),status:"pendente",av:av,cor:cor});
    setUsers(function(p){return p.concat([novo]);});setNovoUsr(USR0);setErrUsr({});
    var perfis={admin:"Administrador",editor:"Editor",visualizador:"Visualizador"};
    var appLink="https://junior-faria.github.io/epi-gestao/";
    var msg="Ola "+novo.nome+"! 👷\n\nVoce foi convidado para acessar o sistema de *Gestao de EPIs* da Sementes Tormenta com perfil de *"+(perfis[novo.perfil]||novo.perfil)+"*.\n\n🔗 Acesse o aplicativo pelo link:\n"+appLink+"\n\nAtenciosamente,\nSetor de Seguranca do Trabalho 🌱";
    var num=novo.wpp.replace(/\D/g,"");
    window.open("https://wa.me/55"+num+"?text="+encodeURIComponent(msg),"_blank");
    toast_("WhatsApp aberto para "+novo.nome+"! 📲");
  }
  function envConvite(u){
    var perfis={admin:"Administrador",editor:"Editor",visualizador:"Visualizador"};
    var appLink2="https://junior-faria.github.io/epi-gestao/";
    var msg="Ola "+u.nome+"! 👷\n\nVoce foi convidado para acessar o sistema de *Gestao de EPIs* da Sementes Tormenta com perfil de *"+(perfis[u.perfil]||u.perfil)+"*.\n\n🔗 Acesse o aplicativo pelo link:\n"+appLink2+"\n\nAtenciosamente,\nSetor de Seguranca do Trabalho 🌱";
    var num=u.wpp.replace(/\D/g,"");
    window.open("https://wa.me/55"+num+"?text="+encodeURIComponent(msg),"_blank");
    toast_("WhatsApp aberto! 📲");
  }
  function removerUsr(id){
    if(!confirm("Remover usuario?"))return;
    setUsers(function(p){return p.filter(function(u){return u.id!==id;});});toast_("Usuario removido");
  }
  function toggleUsr(id){
    setUsers(function(p){return p.map(function(u){return u.id===id?Object.assign({},u,{status:u.status==="ativo"?"inativo":"ativo"}):u;});});
  }

  function handleImportFile(e){
    var file=e.target.files[0];
    if(!file){return;}
    setImportErro("");setImportPreview([]);setImportOk(false);
    var reader=new FileReader();
    reader.onload=function(ev){
      var text=ev.target.result;
      // Remove BOM if present
      if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
      var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
      if(lines.length<2){setImportErro("Arquivo vazio ou sem dados.");return;}
      // Detect separator: tab or semicolon or comma
      var sep="\t";
      if(lines[0].indexOf(";")>-1)sep=";";
      else if(lines[0].indexOf(",")>-1&&lines[0].indexOf("\t")===-1)sep=",";
      var header=lines[0].split(sep).map(function(c){return c.trim().toLowerCase().replace(/[^a-z]/g,"");});
      // Map columns by name
      function col(names){
        for(var i=0;i<names.length;i++){
          var idx=header.indexOf(names[i]);
          if(idx>-1)return idx;
        }
        return -1;
      }
      var iNome=col(["epi","nome","descricao","item"]);
      var iCod=col(["codigo","cod","code"]);
      var iCat=col(["categoria","cat","category"]);
      var iEst=col(["estoque","est","quantidade","qtd","qty","stock"]);
      var iMin=col(["minimo","min","minimoestoque","minimum"]);
      var iUn=col(["unidade","un","unit","und"]);
      var iCa=col(["ca","certificado","certificadodeaprovacao"]);
      var iVal=col(["validade","val","vencimento","expiracao","expiry"]);
      var iCod2=col(["cod","codigo"]);
      if(iNome===-1){setImportErro("Coluna 'EPI' ou 'Nome' não encontrada. Verifique o modelo.");return;}
      var parsed=[];
      for(var r=1;r<lines.length;r++){
        var cols=lines[r].split(sep);
        var nome=(iNome>-1?cols[iNome]||"":"").trim();
        if(!nome)continue;
        // Parse date: dd/mm/yyyy or yyyy-mm-dd
        var rawVal=iVal>-1?(cols[iVal]||"").trim():"";
        var valISO="";
        if(rawVal){
          var dm=rawVal.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
          var dy=rawVal.match(/^(\d{4})-(\d{2})-(\d{2})$/);
          if(dm)valISO=dm[3]+"-"+dm[2]+"-"+dm[1];
          else if(dy)valISO=rawVal;
        }
        parsed.push({
          id:Date.now()+r,
          nome:nome,
          cat:iCat>-1?(cols[iCat]||"Outros").trim():"Outros",
          est:iEst>-1?Math.max(0,parseInt(cols[iEst])||0):0,
          min:iMin>-1?Math.max(1,parseInt(cols[iMin])||1):1,
          un:iUn>-1?(cols[iUn]||"un").trim():"un",
          ca:iCa>-1?(cols[iCa]||"").trim():"",
          val:valISO,
          cod:iCod>-1?(cols[iCod]||"").trim():iCod2>-1?(cols[iCod2]||"").trim():"",
          img:"🪖"
        });
      }
      if(parsed.length===0){setImportErro("Nenhuma linha válida encontrada.");return;}
      setImportPreview(parsed);
    };
    reader.onerror=function(){setImportErro("Erro ao ler o arquivo.");};
    reader.readAsText(file,"UTF-8");
  }

  function confirmarImport(modo){
    if(modo==="substituir"){
      setEpis(importPreview);
    } else {
      setEpis(function(prev){return prev.concat(importPreview);});
    }
    setImportOk(true);
    setImportPreview([]);
    toast_(""+importPreview.length+" EPIs importados! ✅");
    setTimeout(function(){setAba("estoque");},1200);
  }

  function baixarModelo(){
    var BOM="\uFEFF";
    var modelo=BOM+"EPI\tCodigo\tCategoria\tEstoque\tMinimo\tUnidade\tCA\tValidade\n"+
      "Capacete de Segurança\tEPI-001\tCabeça\t15\t10\tun\t31469\t31/12/2026\n"+
      "Luva de Borracha\tEPI-002\tMãos\t8\t20\tpar\t10918\t30/06/2025\n"+
      "Mascara PFF2\tEPI-007\tRespiração\t45\t30\tun\t39503\t01/12/2025\n";
    var blob=new Blob([modelo],{type:"application/vnd.ms-excel;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.download="modelo-importacao-epis.xls";
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    toast_("Modelo baixado! 📄");
  }

  function gerarExcel(){
    var hoje=new Date().toLocaleDateString("pt-BR");
    var crit=epis.filter(function(e){return e.est<e.min;}).length;
    var venc=epis.filter(function(e){
      if(!e.val)return false;
      var d=new Date(e.val+"T00:00:00"),h2=new Date();h2.setHours(0,0,0,0);return d<h2;
    }).length;

    function esc(v){
      var s=String(v||"");
      if(s.indexOf(";")>-1||s.indexOf('"')>-1||s.indexOf("\n")>-1)
        return '"'+s.replace(/"/g,'""')+'"';
      return s;
    }

    var BOM="\uFEFF";
    var SEP=";";
    var linhas=[];
    linhas.push(["sep=;"].join(""));
    linhas.push([esc("Relatório de EPIs - Sementes Tormenta"),esc("Gerado em: "+hoje),"","","","","",""].join(SEP));
    linhas.push("");
    linhas.push([esc("Total EPIs"),esc(epis.length),"",esc("Críticos"),esc(crit),"",esc("Vencidos"),esc(venc)].join(SEP));
    linhas.push("");
    linhas.push([esc("EPI"),esc("Código"),esc("Categoria"),esc("Status"),esc("Estoque"),esc("Unidade"),esc("Mínimo"),esc("CA"),esc("Validade"),esc("Situação Validade")].join(SEP));

    epis.forEach(function(e){
      var sv=svStatus(e.val);
      var st=e.est<e.min?"CRÍTICO":"OK";
      linhas.push([
        esc(e.nome),
        esc(e.cod||""),
        esc(e.cat),
        esc(st),
        esc(e.est),
        esc(e.un),
        esc(e.min),
        esc(e.ca||""),
        esc(fmtDate(e.val)),
        esc(sv?sv.label:"")
      ].join(SEP));
    });

    var csv=BOM+linhas.join("\r\n");
    var blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;
    a.download="relatorio-epis-"+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    toast_("Arquivo Excel baixado! 📊");
  }

  var ABAS=[
    {key:"estoque",label:"📋 Estoque"},
    {key:"entrada",label:"📥 Entrada"},
    {key:"criticos",label:"🚨 Criticos",badge:criticos.length},
    {key:"novo",label:"➕ Novo EPI"},
    {key:"codigos",label:"🔢 Codigos"},

    {key:"compra",label:"📲 Solicitar Compra"},
    {key:"relatorio",label:"📊 Relatorio Excel"},
    {key:"usuarios",label:"👥 Usuarios"},
  ];

  // ── util inline styles ──
  var C={
    flex:function(extra){return Object.assign({display:"flex"},extra||{});},
    card:function(extra){return Object.assign({background:"rgba(10,20,12,.72)",border:"1px solid rgba(80,160,60,.18)",borderRadius:18,padding:18,backdropFilter:"blur(12px)"},extra||{});},
    tag:function(col,bg){return{fontSize:11,borderRadius:6,padding:"3px 9px",fontWeight:600,background:bg||col+"22",color:col,border:"1px solid "+col+"44"};},
  };

                      h("td",{style:{color:sv?sv.cor:"#a8c8a0",fontSize:11}},fmtDate(epi.val)+(sv?" ("+sv.label+")":""))
                    );
                  })
                )
              )
            )
          ),

          // USUARIOS
          aba==="usuarios"&&h("div",{style:{maxWidth:680}},
            h("div",{style:C.card({marginBottom:16})},
              h("div",{style:{fontWeight:700,fontSize:16,marginBottom:16}},"👥 Convidar Novo Usuário"),
              h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}},
                h("div",null,
                  h("label",{className:"lbl"},"Nome completo *"),
                  h("input",{className:"inp",placeholder:"João da Silva",value:novoUsr.nome,
                    style:{borderColor:errUsr.nome?"#e74c3c":"rgba(80,160,60,.25)"},
                    onChange:function(e){setNovoUsr(function(n){return Object.assign({},n,{nome:e.target.value});});}}),
                  errUsr.nome&&h("div",{style:{color:"#e74c3c",fontSize:12,marginTop:4}},errUsr.nome)
                ),
                h("div",null,
                  h("label",{className:"lbl"},"Cargo / Função"),
                  h("input",{className:"inp",placeholder:"Ex: Almoxarife",value:novoUsr.cargo,
                    onChange:function(e){setNovoUsr(function(n){return Object.assign({},n,{cargo:e.target.value});})}})
                )
              ),
              h("div",{style:{marginBottom:12}},
                h("label",{className:"lbl"},"📲 WhatsApp"),
                h("input",{type:"tel",className:"inp",placeholder:"(47) 99999-0000",value:novoUsr.wpp,
                  style:{borderColor:errUsr.wpp?"#e74c3c":"rgba(80,160,60,.25)"},
                  onChange:function(e){setNovoUsr(function(n){return Object.assign({},n,{wpp:e.target.value});});}}),
                errUsr.wpp&&h("div",{style:{color:"#e74c3c",fontSize:12,marginTop:4}},"⚠️ "+errUsr.wpp)
              ),
              h("div",{style:{marginBottom:16}},
                h("label",{className:"lbl"},"Perfil de acesso"),
                h("select",{className:"inp",value:novoUsr.perfil,onChange:function(e){setNovoUsr(function(n){return Object.assign({},n,{perfil:e.target.value});});}},
                  h("option",{value:"admin"},"👑 Administrador — acesso total"),
                  h("option",{value:"editor"},"✏️ Editor — pode editar estoque"),
                  h("option",{value:"visualizador"},"👁 Visualizador — somente leitura")
                )
              ),
              h(Btn,{onClick:convidar,style:{width:"100%",padding:"13px 0",fontSize:15,background:"linear-gradient(90deg,#25d366,#128c7e)"}},"📲 CONVIDAR PELO WHATSAPP")
            ),
            h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}},
              [{label:"Administrador",desc:"Acesso total",icon:"👑",cor:"#8e44ad"},
               {label:"Editor",desc:"Edita estoque e EPIs",icon:"✏️",cor:"#3498db"},
               {label:"Visualizador",desc:"Somente leitura",icon:"👁",cor:"#a8c8a0"}].map(function(p){
                return h("div",{key:p.label,style:C.card({padding:"12px 14px"})},
                  h("div",{style:{fontSize:20,marginBottom:4}},p.icon),
                  h("div",{style:{fontWeight:700,fontSize:12,color:p.cor}},p.label),
                  h("div",{style:{fontSize:11,color:"#a8c8a0",marginTop:2}},p.desc)
                );
              })
            ),
            h("div",{style:{fontWeight:700,fontSize:13,color:"#a8c8a0",marginBottom:10}},"Usuários cadastrados ("+users.length+")"),
            h("div",{style:C.flex({flexDirection:"column",gap:10})},
              users.map(function(u){
                var pCor=u.perfil==="admin"?"#8e44ad":u.perfil==="editor"?"#3498db":"#a8c8a0";
                var pLabel=u.perfil==="admin"?"👑 Admin":u.perfil==="editor"?"✏️ Editor":"👁 Viewer";
                return h("div",{key:u.id,style:C.card({display:"flex",alignItems:"center",gap:12})},
                  h("div",{className:"avatar",style:{width:42,height:42,background:u.cor+"33",border:"2px solid "+u.cor+"66",color:u.cor}},u.av),
                  h("div",{style:{flex:1,minWidth:0}},
                    h("div",{style:{fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
                      u.nome,
                      h("span",{style:{fontSize:10,background:u.status==="ativo"?"#1abc9c22":u.status==="pendente"?"#f39c1222":"#8892b022",
                        color:u.status==="ativo"?"#1abc9c":u.status==="pendente"?"#f39c12":"#a8c8a0",
                        borderRadius:6,padding:"2px 8px",fontWeight:600,textTransform:"uppercase"}},
                        u.status==="pendente"?"⏳ pendente":u.status)
                    ),
                    h("div",{style:{fontSize:12,color:"#a8c8a0",marginTop:2}},u.wpp&&"📲 "+u.wpp),
                    u.cargo&&h("div",{style:{fontSize:11,color:"#a8c8a0",marginTop:1}},u.cargo)
                  ),
                  h("div",{style:C.flex({alignItems:"center",gap:6,flexShrink:0})},
                    h("span",{style:{fontSize:11,padding:"4px 10px",borderRadius:8,background:pCor+"22",color:pCor,fontWeight:600}},pLabel),
                    u.wpp&&h(Btn,{onClick:function(){envConvite(u);},style:{width:32,height:32,padding:0,fontSize:14,background:"rgba(20,35,20,.7)",border:"1px solid rgba(80,160,60,.2)"}},"📲"),
                    u.status!=="pendente"&&h(Btn,{onClick:function(){toggleUsr(u.id);},style:{width:32,height:32,padding:0,fontSize:14,background:"transparent",border:"1px solid rgba(80,160,60,.2)",color:u.status==="ativo"?"#1abc9c":"#a8c8a0"}},u.status==="ativo"?"✅":"⛔"),
                    h(Btn,{onClick:function(){removerUsr(u.id);},style:{width:32,height:32,padding:0,fontSize:14,background:"transparent",border:"1px solid rgba(80,160,60,.2)",color:"#e74c3c"}},"🗑")
                  )
                );
              })
            )
          )

        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
